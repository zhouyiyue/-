<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台风杜苏芮微博舆情分析可视化平台</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #06b6d4, #0ea5e9, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #06b6d4, #0ea5e9);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.4);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .feature {
            background: rgba(30, 41, 59, 0.5);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(6, 182, 212, 0.2);
            backdrop-filter: blur(10px);
        }

        .feature h3 {
            color: #06b6d4;
            margin-bottom: 0.5rem;
        }

        .feature p {
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">台风杜苏芮微博舆情分析可视化平台</h1>
        <p class="subtitle">
            基于大数据分析的台风灾害舆情监测与可视化系统，为应急管理提供科学决策支持
        </p>

        <a href="./dc_visualization" class="button">
            进入可视化平台
        </a>

        <div class="features">
            <div class="feature">
                <h3>📊 实时数据分析</h3>
                <p>实时采集并分析微博舆情数据，提供多维度情感分析和趋势预测</p>
            </div>
            <div class="feature">
                <h3>🗺️ 地理可视化</h3>
                <p>基于地理位置的舆情分布图，直观展示灾害影响区域的舆情状况</p>
            </div>
            <div class="feature">
                <h3>📈 趋势分析</h3>
                <p>动态展示舆情发展趋势，帮助识别关键时间节点和热点事件</p>
            </div>
            <div class="feature">
                <h3>🏛️ 政务响应</h3>
                <p>整合政务微博数据，评估政府应急响应效果和公众满意度</p>
            </div>
        </div>
    </div>
</body>
</html>
